<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>考试刷题</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --text: #1d2528;
      --muted: #647076;
      --line: #dfe4df;
      --panel: #ffffff;
      --green: #2f6b4f;
      --green-soft: #e8f2ec;
      --blue: #2f5f9e;
      --blue-soft: #e9effc;
      --gold: #9b6a1f;
      --gold-soft: #fff1d7;
      --missed: #b7771d;
      --missed-soft: #fff6df;
      --red: #b64b4b;
      --red-soft: #fae9e9;
      --shadow: 0 10px 28px rgba(28, 45, 40, 0.09);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(246,247,244,1) 38%), var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(100%, 430px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 16px 24px;
    }

    .view {
      display: none;
      min-height: calc(100vh - 42px);
    }

    .view.active {
      display: flex;
      flex-direction: column;
    }

    .home {
      justify-content: center;
      gap: 28px;
      padding-bottom: 32px;
    }

    .brand {
      display: grid;
      gap: 10px;
    }

    .brand h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.18;
      font-weight: 760;
      letter-spacing: 0;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .home-actions {
      display: grid;
      gap: 14px;
    }

    .entry {
      display: grid;
      grid-template-columns: 44px 1fr 24px;
      align-items: center;
      gap: 14px;
      width: 100%;
      min-height: 82px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 16px;
      text-align: left;
      box-shadow: var(--shadow);
    }

    .entry:active,
    .option:active,
    .primary:active,
    .secondary:active,
    .danger:active,
    .icon-btn:active {
      transform: translateY(1px);
    }

    .entry-mark {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 760;
    }

    .entry:nth-child(1) .entry-mark {
      background: var(--green-soft);
      color: var(--green);
    }

    .entry:nth-child(2) .entry-mark {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .entry:nth-child(3) .entry-mark {
      background: var(--gold-soft);
      color: var(--gold);
    }

    .entry:nth-child(4) .entry-mark {
      background: var(--red-soft);
      color: var(--red);
    }

    .entry:nth-child(5) .entry-mark {
      background: #edf0f2;
      color: #415049;
    }

    .entry-title {
      display: block;
      font-size: 20px;
      font-weight: 730;
      line-height: 1.2;
    }

    .entry-sub {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .chevron {
      color: #8a9498;
      font-size: 24px;
      line-height: 1;
    }

    .topbar {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      min-height: 52px;
      margin-bottom: 10px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-size: 22px;
      line-height: 1;
    }

    .icon-btn.is-on {
      border-color: #e0c17c;
      background: var(--gold-soft);
      color: var(--gold);
    }

    .topbar-title {
      text-align: center;
      font-size: 18px;
      font-weight: 730;
    }

    .placeholder {
      display: grid;
      align-content: center;
      gap: 14px;
      flex: 1;
      padding: 24px 6px;
      text-align: center;
    }

    .placeholder-box {
      border: 1px dashed #b7c0bd;
      border-radius: 8px;
      background: rgba(255,255,255,0.72);
      padding: 26px 18px;
    }

    .placeholder-box h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .placeholder-box p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .quiz-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
      padding-bottom: 112px;
    }

    .progress {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #e3e7e3;
    }

    .progress span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--blue));
    }

    .question-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      height: 26px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue);
      padding: 0 10px;
      font-size: 13px;
      font-weight: 680;
      white-space: nowrap;
    }

    .question {
      margin: 0;
      font-size: 18px;
      line-height: 1.55;
      font-weight: 700;
    }

    .multi-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      height: 24px;
      margin-right: 8px;
      padding: 0 8px;
      border-radius: 6px;
      background: var(--gold-soft);
      color: var(--gold);
      border: 1px solid #efcf92;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      vertical-align: 2px;
    }

    .question-image {
      display: block;
      width: 100%;
      max-height: 420px;
      object-fit: contain;
      margin-top: 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .option {
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 10px;
      align-items: center;
      width: 100%;
      border: 1px solid #d7ded9;
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      text-align: left;
      line-height: 1.5;
      color: var(--text);
      position: relative;
    }

    .option.selected {
      border-color: var(--blue);
      background: var(--blue-soft);
      box-shadow: 0 0 0 2px rgba(47, 95, 158, 0.18);
      font-weight: 720;
    }

    .option.selected::after {
      content: "已选";
      position: absolute;
      top: 8px;
      right: 10px;
      border-radius: 999px;
      background: var(--blue);
      color: #fff;
      padding: 2px 7px;
      font-size: 12px;
      font-weight: 760;
    }

    .option.correct {
      border-color: var(--green);
      background: var(--green-soft);
    }

    .option.wrong {
      border-color: var(--red);
      background: var(--red-soft);
    }

    .option.missed {
      border-color: var(--missed);
      background: var(--missed-soft);
    }

    .letter {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #eef1ee;
      font-weight: 740;
      color: #415049;
    }

    .answer-box {
      display: grid;
      gap: 8px;
      margin-top: 14px;
      border-radius: 8px;
      background: #f8faf8;
      border: 1px solid var(--line);
      padding: 14px;
    }

    .answer-box[hidden] {
      display: none;
    }

    .answer-box strong {
      color: var(--green);
    }

    .answer-box p {
      margin: 0;
      color: #455158;
      line-height: 1.65;
      font-size: 14px;
    }


    .mistake-tip {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      border-radius: 8px;
      background: var(--red-soft);
      color: var(--red);
      border: 1px solid #e0baba;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 760;
      line-height: 1.45;
    }

    .mistake-tip::before {
      content: "错题";
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--red);
      color: #fff;
      padding: 2px 8px;
      font-size: 12px;
    }

    .quiz-actions {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 20;
      width: min(100%, 430px);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 0;
      padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
      background: rgba(246, 247, 244, 0.96);
      border-top: 1px solid var(--line);
      box-shadow: 0 -10px 26px rgba(28, 45, 40, 0.12);
      backdrop-filter: blur(12px);
    }

    .full-row {
      grid-column: 1 / -1;
    }

    .primary,
    .secondary,
    .danger {
      min-height: 48px;
      border-radius: 8px;
      padding: 0 14px;
      font-weight: 720;
    }

    .primary {
      border: 1px solid var(--green);
      background: var(--green);
      color: #fff;
    }

    .primary:disabled,
    .secondary:disabled {
      opacity: 0.48;
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
    }

    .danger {
      border: 1px solid #dcb7b7;
      background: var(--red-soft);
      color: var(--red);
    }


    .category-wrap {
      display: grid;
      gap: 18px;
      padding-bottom: 18px;
    }

    .category-section {
      display: grid;
      gap: 10px;
    }

    .category-section h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .category-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .category-card {
      min-height: 86px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      box-shadow: var(--shadow);
      padding: 12px;
      text-align: left;
    }

    .category-card strong {
      display: block;
      font-size: 17px;
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .category-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .batch-panel {
      display: grid;
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .batch-panel h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.35;
    }

    .batch-summary {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    .batch-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .batch-option {
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 16px;
      font-weight: 760;
    }

    .empty {
      flex: 1;
      display: grid;
      align-content: center;
      gap: 14px;
      text-align: center;
      color: var(--muted);
      line-height: 1.6;
    }
    .backup-panel {
      display: grid;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .backup-panel h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .backup-panel p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }
    .sync-input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
      color: var(--text);
      padding: 0 12px;
      font-size: 15px;
    }

    .sync-status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .sync-divider {
      height: 1px;
      background: var(--line);
      margin: 4px 0;
    }

    .backup-text {
      width: 100%;
      min-height: 132px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
      color: var(--text);
      padding: 12px;
      font: 13px/1.5 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    .backup-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 10;
      min-width: 160px;
      max-width: min(340px, calc(100% - 32px));
      border-radius: 8px;
      background: rgba(29, 37, 40, 0.92);
      color: #fff;
      padding: 10px 14px;
      text-align: center;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
    }

    .toast.show {
      opacity: 1;
    }

    @media (max-width: 360px) {
      .app {
        padding-left: 12px;
        padding-right: 12px;
      }

      .brand h1 {
        font-size: 28px;
      }

      .entry {
        grid-template-columns: 40px 1fr 20px;
        padding: 14px;
      }

      .entry-mark {
        width: 40px;
        height: 40px;
      }

      .question {
        font-size: 18px;
      }

      .category-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="home" class="view home active" aria-label="首页">
      <div class="brand">
        <h1>考试刷题</h1>
        <p>手机上快速进入知识点、刷题、收藏和错题本。进度、答案状态和收藏会自动记录。</p>
      </div>

      <div class="home-actions">
        <button class="entry" data-view="knowledge">
          <span class="entry-mark">知</span>
          <span>
            <span class="entry-title">知识点</span>
            <span class="entry-sub">后续放章节、要点和归纳内容</span>
          </span>
          <span class="chevron">›</span>
        </button>

        <button class="entry" data-view="quiz">
          <span class="entry-mark">题</span>
          <span>
            <span class="entry-title">刷题</span>
            <span class="entry-sub" id="quizResumeText">继续上次位置</span>
          </span>
          <span class="chevron">›</span>
        </button>

        <button class="entry" data-view="favorite">
          <span class="entry-mark">收</span>
          <span>
            <span class="entry-title">收藏</span>
            <span class="entry-sub" id="favoriteResumeText">集中复习收藏过的题目</span>
          </span>
          <span class="chevron">›</span>
        </button>

        <button class="entry" data-view="mistakes">
          <span class="entry-mark">错</span>
          <span>
            <span class="entry-title">错题本</span>
            <span class="entry-sub" id="mistakeResumeText">自动收集做错的题目</span>
          </span>
          <span class="chevron">›</span>
        </button>
        <button class="entry" data-view="backup">
          <span class="entry-mark">备</span>
          <span>
            <span class="entry-title">保存/同步</span>
            <span class="entry-sub">保存手机记录，导入到电脑</span>
          </span>
          <span class="chevron">›</span>
        </button>
      </div>
    </section>

    <section id="knowledge" class="view" aria-label="知识点">
      <header class="topbar">
        <button class="icon-btn" data-view="home" aria-label="返回首页">‹</button>
        <div class="topbar-title">知识点</div>
        <span></span>
      </header>
      <div class="placeholder">
        <div class="placeholder-box">
          <h2>知识点待补充</h2>
          <p>这里先空出来。后续你给我知识点内容后，可以做成章节列表、搜索、重点标记和阅读页。</p>
        </div>
      </div>
    </section>

    <section id="quiz" class="view" aria-label="刷题">
      <header class="topbar">
        <button class="icon-btn" data-action="quizBack" aria-label="返回">‹</button>
        <div class="topbar-title" id="quizTitle">刷题</div>
        <button class="icon-btn" id="favoriteToggle" aria-label="收藏题目">☆</button>
      </header>
      <div id="quizContent" class="quiz-wrap"></div>
    </section>

    <section id="favorite" class="view" aria-label="收藏">
      <header class="topbar">
        <button class="icon-btn" data-view="home" aria-label="返回首页">‹</button>
        <div class="topbar-title">收藏</div>
        <span></span>
      </header>
      <div id="favoriteContent" class="quiz-wrap"></div>
    </section>

    <section id="mistakes" class="view" aria-label="错题本">
      <header class="topbar">
        <button class="icon-btn" data-view="home" aria-label="返回首页">‹</button>
        <div class="topbar-title">错题本</div>
        <span></span>
      </header>
      <div id="mistakeContent" class="quiz-wrap"></div>
    </section>
    <section id="backup" class="view" aria-label="保存同步">
      <header class="topbar">
        <button class="icon-btn" data-view="home" aria-label="返回首页">‹</button>
        <div class="topbar-title">保存/同步</div>
        <span></span>
      </header>
      <div class="backup-panel">
        <h2>云同步</h2>
        <p>手机和电脑填写同一个同步码，就能自动同步收藏、错题本和刷题记录。</p>
        <input id="syncUserInput" class="sync-input" autocomplete="off" placeholder="输入同步码，例如 qingbei001">
        <div class="backup-actions">
          <button class="primary" data-action="bindSync">启用同步</button>
          <button class="secondary" data-action="pullCloud">拉取云端</button>
          <button class="primary" data-action="pushCloud">保存到云端</button>
          <button class="secondary" data-action="clearSync">取消同步</button>
        </div>
        <div id="syncStatus" class="sync-status">未启用云同步</div>
        <div class="sync-divider"></div>
        <h2>保存码备份</h2>
        <p>如果网络不可用，可以先在手机端导出保存码，再到电脑端导入合并。</p>
        <textarea id="backupText" class="backup-text" autocomplete="off" spellcheck="false" placeholder="备份码会显示在这里，也可以粘贴备份码"></textarea>
        <div class="backup-actions">
          <button class="primary" data-action="exportData">导出保存码</button>
          <button class="secondary" data-action="copyBackup">复制保存码</button>
          <button class="primary" data-action="importData">导入合并</button>
          <button class="secondary" data-action="clearBackup">清空</button>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const questions = [
      {
            "id": "q0001",
            "type": "single",
            "business": "product-design",
            "question": "PRD 的“需求清单”中，除了功能清单，还必须包含？",
            "options": [
                  "接口清单",
                  "测试报告",
                  "用户反馈汇总",
                  "代码仓库地址"
            ],
            "answer": [
                  "A"
            ],
            "analysis": "PRD要把需求结构化表达清楚，常用 SMART 描述目标收益，用 MoSCoW 区分需求优先级。 本题答案选 A，因为它最符合该知识点的定义或判断口径。"
      },
      {
            "id": "q0002",
            "type": "single",
            "business": "AA",
            "question": "“将单个大型后端应用拆分为一组小而自治的服务，每个服务围绕特定业务能力构建，并拥有独立数据库。”描述的是？",
            "options": [
                  "微前端",
                  "服务网格",
                  "容器化",
                  "微服务"
            ],
            "answer": [
                  "D"
            ],
            "analysis": "微服务强调小而自治、围绕特定业务能力构建、可独立部署，常配合独立的数据管理边界。 本题答案选 D，因为题干描述的是微服务。"
      },
      {
            "id": "q0003",

            "analysis": "关于「熵增」与架构管理，以下理解正确的有:A熵增指系统随时间和变更逐渐腐化、趋于混乱(如云原生环境下微服务无序创建，导致功能重复、技术栈混乱、运维成本飙升)；B熵增不可避免(只要系统持续演进，复杂性就会逐渐增加)；C通过技术规范与契约可主动对抗系统腐化(如统一技术栈、强制组件契约、自动化测试覆盖，使架构在规范约束下逐步成长)；D定期重构可以延缓退化节奏(如每季度进行代码质量审查和架构健康度评估，及时偿还技术债务)。选项E「熵增可以通过一次重构彻底消除」错误——演进式架构强调「受控的演化」，需要在架构规范、自动化测试和契约约束下允许系统逐步成长，既不是无序蔓延，也不是一次重构永逸。正确答案为ABCD。"
      }
];

    const TYPE_LABELS = {
      single: "单选题",
      multiple: "多选题",
      other: "其他题"
    };

    const BUSINESS_LABELS = {
      BA: "BA",
      IA: "IA",
      AA: "AA",
      "data-governance": "数据治理",
      "product-design": "产品设计",
      "digital-transformation": "数字化转型",
      PMP: "PMP",
      NPDP: "NPDP",
      "cloud-native": "云原生",
      "product-thinking": "产品思维"
    };

    const TYPE_FILTERS = Object.keys(TYPE_LABELS).map((key) => ({ key: `type:${key}`, label: TYPE_LABELS[key], kind: "type", value: key }));
    const BUSINESS_FILTERS = Object.keys(BUSINESS_LABELS).map((key) => ({ key: `business:${key}`, label: BUSINESS_LABELS[key], kind: "business", value: key }));
    const ALL_FILTERS = [...TYPE_FILTERS, ...BUSINESS_FILTERS];

    const STORE_KEY = "examPracticeState.v3";
    const BACKUP_PREFIX = "EXAM_STATE_V1:";
    const SYNC_USER_KEY = "examPracticeSyncUser.v1";
    const BATCH_SIZES = [20, 50, 100, 200, "all"];
        const defaultState = {
      activeFilterKey: null,
      activeBatch: null,
      quizPositions: {},
      quizOrders: {},
      quizBatchOffsets: {},
      favoriteIndex: 0,
      mistakeIndex: 0,
      favorites: [],
      mistakes: {},
      answers: {},
      favoriteAnswers: {},
      mistakeAnswers: {}
    };

    let state = loadState();
    let currentView = "home";
    let toastTimer = null;
    let syncUser = loadSyncUser();
    let cloudSaveTimer = null;
    let applyingRemoteState = false;

    const views = Array.from(document.querySelectorAll(".view"));
    const quizContent = document.querySelector("#quizContent");
    const favoriteContent = document.querySelector("#favoriteContent");
    const mistakeContent = document.querySelector("#mistakeContent");
    const favoriteToggle = document.querySelector("#favoriteToggle");
    const quizResumeText = document.querySelector("#quizResumeText");
    const favoriteResumeText = document.querySelector("#favoriteResumeText");
    const mistakeResumeText = document.querySelector("#mistakeResumeText");
    const backupText = document.querySelector("#backupText");
    const syncUserInput = document.querySelector("#syncUserInput");
    const syncStatus = document.querySelector("#syncStatus");
    const quizTitle = document.querySelector("#quizTitle");
    const toast = document.querySelector("#toast");

    document.addEventListener("click", (event) => {
      const viewTrigger = event.target.closest("[data-view]");
      if (viewTrigger) {
        showView(viewTrigger.dataset.view);
        return;
      }

      const action = event.target.closest("[data-action]");
      if (!action) return;
      handleAction(action.dataset.action, action.dataset.value);
    });

    favoriteToggle.addEventListener("click", () => {
      const question = activeQuestion();
      if (!question) return;
      toggleFavorite(question.id);
      renderAll();
    });

    renderAll();
    initializeSync();

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORE_KEY)) || JSON.parse(localStorage.getItem("examPracticeState.v1"));
        return normalizeSavedState(saved);
      } catch {
        return cloneDefaultState();
      }
    }

    function normalizeSavedState(saved) {
      if (!saved || typeof saved !== "object") return cloneDefaultState();
      return {
        activeFilterKey: typeof saved.activeFilterKey === "string" ? saved.activeFilterKey : null,
        activeBatch: normalizeActiveBatch(saved.activeBatch),
        quizPositions: saved.quizPositions && typeof saved.quizPositions === "object" ? saved.quizPositions : { all: clampNumber(saved.quizIndex || 0, 0, questions.length - 1) },
        quizOrders: saved.quizOrders && typeof saved.quizOrders === "object" ? saved.quizOrders : {},
        quizBatchOffsets: saved.quizBatchOffsets && typeof saved.quizBatchOffsets === "object" ? saved.quizBatchOffsets : {},
        favoriteIndex: clampNumber(saved.favoriteIndex, 0, Math.max(0, questions.length - 1)),
        mistakeIndex: clampNumber(saved.mistakeIndex, 0, Math.max(0, questions.length - 1)),
        favorites: Array.isArray(saved.favorites) ? mergeQuestionIdLists(saved.favorites) : [],
        mistakes: normalizeMistakes(saved.mistakes),
        answers: saved.answers && typeof saved.answers === "object" ? saved.answers : {},
        favoriteAnswers: saved.favoriteAnswers && typeof saved.favoriteAnswers === "object" ? saved.favoriteAnswers : {},
        mistakeAnswers: saved.mistakeAnswers && typeof saved.mistakeAnswers === "object" ? saved.mistakeAnswers : {}
      };
    }

    function cloneDefaultState() {
      return JSON.parse(JSON.stringify(defaultState));
    }

    function saveState() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
      updateHomeResume();
      if (!applyingRemoteState) scheduleCloudSave();
    }

    function showView(viewName) {
      currentView = viewName;
      views.forEach((view) => view.classList.toggle("active", view.id === viewName));
      if (viewName === "quiz") {
        state.activeFilterKey = null;
        state.activeBatch = null;
      }
      if (viewName === "favorite") {
        const favs = favoriteQuestions();
        state.favoriteIndex = clampNumber(state.favoriteIndex, 0, Math.max(0, favs.length - 1));
      }
      if (viewName === "mistakes") {
        const mistakes = mistakeQuestions();
        state.mistakeIndex = clampNumber(state.mistakeIndex, 0, Math.max(0, mistakes.length - 1));
      }
      saveState();
      renderAll();
      window.scrollTo({ top: 0, behavior: "instant" });
    }

    function handleAction(action, value) {
      if (action === "startPractice") startPractice(value);
      if (action === "chooseBatch") chooseBatch(value);
      if (action === "resetPracticeRound") resetPracticeRound(value);
      if (action === "quizBack") backFromQuiz();
      if (action === "select") selectOption(value);
      if (action === "confirm") confirmAnswer();
      if (action === "prev") moveQuestion(-1);
      if (action === "next") moveQuestion(1);
      if (action === "removeFavorite") removeFavorite(value);
      if (action === "clearMistakes") clearMistakes();
      if (action === "exportData") exportData();
      if (action === "copyBackup") copyBackup();
      if (action === "importData") importData();
      if (action === "clearBackup" && backupText) backupText.value = "";
      if (action === "bindSync") bindSync();
      if (action === "pullCloud") pullCloudState(true, true);
      if (action === "pushCloud") saveCloudState(true);
      if (action === "clearSync") clearSync();
      renderAll();
    }

    function startPractice(filterKey) {
      const filter = findFilter(filterKey);
      if (!filter) return;
      state.activeFilterKey = filterKey;
      state.activeBatch = null;
      ensureQuizOrder(filterKey);
      clampQuizBatchOffset(filterKey);
      saveState();
    }

    function chooseBatch(value) {
      const [filterKey, sizeValue] = String(value || "").split("|");
      if (!findFilter(filterKey)) return;
      state.activeFilterKey = filterKey;
      ensureQuizOrder(filterKey);
      const ordered = orderedQuizQuestions(filterKey);
      const total = ordered.length;
      const start = quizBatchOffset(filterKey, total);
      if (!total || start >= total) return;
      const requested = sizeValue === "all" ? total - start : clampNumber(sizeValue, 1, total);
      const end = Math.min(start + requested, total);
      state.activeBatch = {
        filterKey,
        ids: ordered.slice(start, end).map(question => question.id),
        start,
        end,
        total
      };
      state.quizBatchOffsets[filterKey] = end;
      state.quizPositions[filterKey] = 0;
      saveState();
    }

    function resetPracticeRound(filterKey) {
      if (!findFilter(filterKey)) return;
      resetQuizRound(filterKey);
      state.activeFilterKey = filterKey;
      state.activeBatch = null;
      showToast("已重新随机出题");
      saveState();
    }

    function backFromQuiz() {
      if (state.activeFilterKey && hasActiveBatch()) {
        state.activeBatch = null;
      } else if (state.activeFilterKey) {
        state.activeFilterKey = null;
        state.activeBatch = null;
      } else {
        showView("home");
        return;
      }
      saveState();
    }

    function selectOption(letter) {
      const question = activeQuestion();
      if (!question || question.type === "other") return;
      const record = answerRecord(question.id);
      if (record.revealed && question.type !== "multiple") return;

      if (question.type === "multiple") {
        if (record.revealed) return;
        record.selected = record.selected.includes(letter)
          ? record.selected.filter(item => item !== letter)
          : [...record.selected, letter].sort();
      } else {
        record.selected = [letter];
        record.revealed = true;
        updateMistakeBook(question, record);
      }
      saveState();
    }

    function confirmAnswer() {
      const question = activeQuestion();
      if (!question || question.type !== "multiple") return;
      const record = answerRecord(question.id);
      if (!record.selected.length) {
        showToast("请先选择答案");
        return;
      }
      record.revealed = true;
      updateMistakeBook(question, record);
      saveState();
    }

    function moveQuestion(delta) {
      if (currentView === "quiz" && state.activeFilterKey && hasActiveBatch()) {
        const list = activeQuizQuestions();
        const key = state.activeFilterKey;
        const current = activeQuizIndex();
        if (delta > 0 && list.length && current >= list.length - 1) {
          state.activeBatch = null;
          state.quizPositions[key] = 0;
          showToast("本组已完成");
        } else {
          state.quizPositions[key] = clampNumber(current + delta, 0, Math.max(0, list.length - 1));
        }
      }
      if (currentView === "favorite") {
        const favs = favoriteQuestions();
        state.favoriteIndex = clampNumber(state.favoriteIndex + delta, 0, Math.max(0, favs.length - 1));
      }
      if (currentView === "mistakes") {
        const list = mistakeQuestions();
        const current = clampNumber(state.mistakeIndex, 0, Math.max(0, list.length - 1));
        const currentQuestion = list[current];
        if (currentQuestion) resetMistakeAnswer(currentQuestion.id);
        if (delta > 0 && list.length && current >= list.length - 1) {
          state.mistakeIndex = 0;
        } else {
          state.mistakeIndex = clampNumber(current + delta, 0, Math.max(0, list.length - 1));
        }
      }
      saveState();
    }

    function toggleFavorite(questionId) {
      if (state.favorites.includes(questionId)) {
        state.favorites = state.favorites.filter(id => id !== questionId);
        showToast("已取消收藏");
      } else {
        state.favorites.push(questionId);
        showToast("已收藏");
      }
      saveState();
    }

    function removeFavorite(questionId) {
      state.favorites = state.favorites.filter(id => id !== questionId);
      resetFavoriteAnswer(questionId);
      const favs = favoriteQuestions();
      state.favoriteIndex = clampNumber(state.favoriteIndex, 0, Math.max(0, favs.length - 1));
      showToast("已移除收藏");
      saveState();
    }

    function clearMistakes() {
      state.mistakes = {};
      state.mistakeAnswers = {};
      state.mistakeIndex = 0;
      showToast("\u5df2\u6e05\u7a7a\u9519\u9898\u672c");
      saveState();
    }

    function renderAll() {
      renderQuiz();
      renderFavorite();
      renderMistakes();
      updateFavoriteButton();
      updateHomeResume();
    }

    function renderQuiz() {
      if (!state.activeFilterKey) {
        quizTitle.textContent = "刷题分类";
        favoriteToggle.style.visibility = "hidden";
        quizContent.className = "category-wrap";
        quizContent.innerHTML = renderCategoryList();
        return;
      }

      const filter = findFilter(state.activeFilterKey);
      const allList = orderedQuizQuestions(state.activeFilterKey);
      quizTitle.textContent = filter ? filter.label : "刷题";
      favoriteToggle.style.visibility = hasActiveBatch() ? "visible" : "hidden";
      quizContent.className = hasActiveBatch() ? "quiz-wrap" : "category-wrap";

      if (!allList.length) {
        quizContent.innerHTML = `<div class="empty"><div class="placeholder-box"><h2>暂无题目</h2><p>这个分类下还没有题目，后续导入题库后会自动显示。</p></div></div>`;
        return;
      }

      if (!hasActiveBatch()) {
        quizContent.innerHTML = renderBatchPicker(state.activeFilterKey);
        return;
      }

      const list = activeQuizQuestions();
      const index = activeQuizIndex();
      quizContent.innerHTML = renderQuestion({
        question: list[index],
        index,
        total: list.length,
        progressPrefix: "本次第",
        mode: "quiz"
      });
    }

    function renderCategoryList() {
      return `
        <section class="category-section">
          <h2>按题型刷题</h2>
          <div class="category-grid">
            ${TYPE_FILTERS.map(renderCategoryCard).join("")}
          </div>
        </section>
        <section class="category-section">
          <h2>按业务刷题</h2>
          <div class="category-grid">
            ${BUSINESS_FILTERS.map(renderCategoryCard).join("")}
          </div>
        </section>
      `;
    }

    function renderCategoryCard(filter) {
      const list = filteredQuestions(filter.key);
      const remaining = quizRemaining(filter.key, list.length);
      const detail = list.length ? `共 ${list.length} 题，剩余 ${remaining} 题未进入批次` : "暂无题目";
      return `<button class="category-card" data-action="startPractice" data-value="${filter.key}"><strong>${escapeHtml(filter.label)}</strong><span>${detail}</span></button>`;
    }

    function renderBatchPicker(filterKey) {
      const filter = findFilter(filterKey);
      const list = orderedQuizQuestions(filterKey);
      const total = list.length;
      const offset = quizBatchOffset(filterKey, total);
      const remaining = Math.max(0, total - offset);
      if (!remaining) {
        return `
          <section class="batch-panel">
            <h2>${escapeHtml(filter ? filter.label : "刷题")}</h2>
            <p class="batch-summary">本分类 ${total} 题已全部进入过批次。重新开始会随机打乱题目顺序，并清空本分类普通刷题答案。</p>
            <button class="primary" data-action="resetPracticeRound" data-value="${filterKey}">重新随机开始</button>
          </section>
        `;
      }
      return `
        <section class="batch-panel">
          <h2>${escapeHtml(filter ? filter.label : "刷题")}</h2>
          <p class="batch-summary">共 ${total} 题，已进入批次 ${offset} 题，剩余 ${remaining} 题。本次选择题量后，将从第 ${offset + 1} 题开始。</p>
          <div class="batch-options">
            ${BATCH_SIZES.map(size => renderBatchOption(filterKey, size, remaining)).join("")}
          </div>
        </section>
      `;
    }

    function renderBatchOption(filterKey, size, remaining) {
      const label = size === "all" ? `全部 ${remaining} 题` : `${Math.min(size, remaining)} 题`;
      return `<button class="batch-option" data-action="chooseBatch" data-value="${filterKey}|${size}">${label}</button>`;
    }

    function renderFavorite() {
      const favs = favoriteQuestions();
      if (!favs.length) {
        favoriteContent.innerHTML = `
          <div class="empty">
            <div class="placeholder-box">
              <h2>暂无收藏题目</h2>
              <p>去刷题页面点右上角星标，就可以把题目加入收藏。</p>
            </div>
            <button class="primary" data-view="quiz">去刷题</button>
          </div>
        `;
        return;
      }

      state.favoriteIndex = clampNumber(state.favoriteIndex, 0, favs.length - 1);
      const question = favs[state.favoriteIndex];
      favoriteContent.innerHTML = renderQuestion({
        question,
        index: state.favoriteIndex,
        total: favs.length,
        progressPrefix: "收藏第",
        mode: "favorite"
      });
    }

    function renderMistakes() {
      const list = mistakeQuestions();
      if (!list.length) {
        mistakeContent.innerHTML = `
          <div class="empty">
            <div class="placeholder-box">
              <h2>暂无错题</h2>
              <p>刷题时答错的题会自动进入这里；在错题本中答对 2 次后会自动移除。</p>
            </div>
            <button class="primary" data-view="quiz">去刷题</button>
          </div>
        `;
        return;
      }

      state.mistakeIndex = clampNumber(state.mistakeIndex, 0, list.length - 1);
      const question = list[state.mistakeIndex];
      mistakeContent.innerHTML = renderQuestion({
        question,
        index: state.mistakeIndex,
        total: list.length,
        progressPrefix: "错题第",
        mode: "mistakes"
      });
    }

    function renderQuestion({ question, index, total, progressPrefix, mode }) {
      const record = answerRecord(question.id, mode);
      const autoReveal = question.type === "other";
      const revealed = record.revealed || autoReveal;
      const percent = total <= 1 ? 100 : Math.round(((index + 1) / total) * 100);
      const businessLabel = BUSINESS_LABELS[question.business] || question.business || "未分类";
      const removeButton = mode === "favorite"
        ? `<button class="danger full-row" data-action="removeFavorite" data-value="${question.id}">移除收藏</button>`
        : "";
      const confirmButton = question.type === "multiple"
        ? `<button class="primary full-row" data-action="confirm" ${revealed ? "disabled" : ""}>确认多选答案</button>`
        : "";
      const multiBadge = question.type === "multiple" ? `<span class="multi-badge" aria-label="\u591a\u9009\u9898">\u591a\u9009</span>` : "";
      const otherAnswer = question.type === "other"
        ? `<div class="answer-box"><strong>参考答案</strong><p>${escapeHtml(question.answerText || "")}</p><p>${escapeHtml(question.analysis || "")}</p></div>`
        : "";
      const mistake = state.mistakes && state.mistakes[question.id];
      const mistakeTip = mode === "mistakes"
        ? `<div class="mistake-tip">已答对 ${mistake ? mistake.correctCount || 0 : 0} / 2 次，答对 2 次后自动移出错题本。</div>`
        : "";
      const clearMistakesButton = mode === "mistakes"
        ? `<button class="danger full-row" data-action="clearMistakes">\u5168\u90e8\u79fb\u9664\u9519\u9898</button>`
        : "";
      const nextDisabled = mode === "favorite" && index === total - 1;
      const nextLabel = mode === "quiz" && index === total - 1
        ? "完成本组"
        : mode === "mistakes" && index === total - 1
          ? "再做一遍"
          : "\u4e0b\u4e00\u9898";

      return `
        <div class="progress" aria-label="答题进度"><span style="width: ${percent}%"></span></div>
        <article class="question-panel">
          <div class="question-meta">
            <span>${progressPrefix} ${index + 1} / ${total} 题</span>
            <span class="tag">${TYPE_LABELS[question.type]} · ${escapeHtml(businessLabel)}</span>
          </div>
          <p class="question">${multiBadge}${escapeHtml(question.question)}</p>
          ${renderQuestionImage(question)}
          ${mistakeTip}
          ${question.type !== "other" ? renderOptions(question, record, revealed) : otherAnswer}
          ${question.type !== "other" ? renderAnswer(question, revealed) : ""}
        </article>
        <div class="quiz-actions">
          <button class="secondary" data-action="prev" ${index === 0 ? "disabled" : ""}>上一题</button>
          <button class="primary" data-action="next" ${nextDisabled ? "disabled" : ""}>${nextLabel}</button>
          ${confirmButton}
          ${removeButton}
          ${clearMistakesButton}
        </div>
      `;
    }

    function renderQuestionImage(question) {
      if (!question.image) return "";
      return `<img class="question-image" src="${escapeHtml(question.image)}" alt="题目图片">`;
    }

    function renderOptions(question, record, revealed) {
      return `
        <div class="options">
          ${question.options.map((option, optionIndex) => {
            const letter = String.fromCharCode(65 + optionIndex);
            const selected = record.selected.includes(letter);
            const correct = question.answer.includes(letter);
            let className = "option";
            if (revealed && selected && correct) className += " correct";
            else if (revealed && selected && !correct) className += " wrong";
            else if (revealed && !selected && correct) className += question.type === "multiple" ? " missed" : " correct";
            else if (selected) className += " selected";
            return `
              <button class="${className}" data-action="select" data-value="${letter}">
                <span class="letter">${letter}</span>
                <span>${escapeHtml(option)}</span>
              </button>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderAnswer(question, revealed) {
      const answer = question.answer.join("、");
      return `
        <div class="answer-box" ${revealed ? "" : "hidden"}>
          <strong>正确答案：${escapeHtml(answer)}</strong>
          <p>解析：${escapeHtml(question.analysis || "暂无解析")}</p>
        </div>
      `;
    }

    function updateFavoriteButton() {
      const question = activeQuestion();
      if (!question || currentView !== "quiz" || !state.activeFilterKey || !hasActiveBatch()) {
        favoriteToggle.style.visibility = "hidden";
        return;
      }
      const isFavorite = state.favorites.includes(question.id);
      favoriteToggle.textContent = isFavorite ? "★" : "☆";
      favoriteToggle.classList.toggle("is-on", isFavorite);
      favoriteToggle.setAttribute("aria-label", isFavorite ? "取消收藏" : "收藏题目");
    }

    function updateHomeResume() {
      const active = findFilter(state.activeFilterKey);
      quizResumeText.textContent = active ? `上次刷到：${active.label}` : "按题型或业务分类刷题";
      favoriteResumeText.textContent = state.favorites.length
        ? `已收藏 ${state.favorites.length} 题，继续第 ${Math.min(state.favoriteIndex + 1, state.favorites.length)} 题`
        : "暂无收藏题目";
      const mistakeCount = Object.keys(state.mistakes || {}).length;
      mistakeResumeText.textContent = mistakeCount
        ? `当前 ${mistakeCount} 道错题，答对 2 次自动移除`
        : "暂无错题";
    }

    function activeQuestion() {
      if (currentView === "quiz" && state.activeFilterKey && hasActiveBatch()) return activeQuizQuestions()[activeQuizIndex()];
      if (currentView === "favorite") return favoriteQuestions()[state.favoriteIndex];
      if (currentView === "mistakes") return mistakeQuestions()[state.mistakeIndex];
      return null;
    }

    function activeQuizQuestions() {
      if (!hasActiveBatch()) return [];
      const byId = new Map(orderedQuizQuestions(state.activeFilterKey).map(question => [question.id, question]));
      return state.activeBatch.ids.map(id => byId.get(id)).filter(Boolean);
    }

    function hasActiveBatch() {
      return Boolean(
        state.activeBatch &&
        state.activeBatch.filterKey === state.activeFilterKey &&
        Array.isArray(state.activeBatch.ids) &&
        state.activeBatch.ids.length
      );
    }

    function orderedQuizQuestions(filterKey) {
      const list = filteredQuestions(filterKey);
      ensureQuizOrder(filterKey, list);
      const byId = new Map(list.map(question => [question.id, question]));
      return (state.quizOrders[filterKey] || [])
        .map(id => byId.get(id))
        .filter(Boolean);
    }

    function ensureQuizOrder(filterKey, list = filteredQuestions(filterKey)) {
      if (!filterKey) return;
      if (!state.quizOrders || typeof state.quizOrders !== "object") state.quizOrders = {};
      const ids = list.map(question => question.id);
      const current = Array.isArray(state.quizOrders[filterKey]) ? state.quizOrders[filterKey] : [];
      const currentSet = new Set(current);
      const valid = current.length === ids.length && ids.every(id => currentSet.has(id));
      if (!valid) {
        state.quizOrders[filterKey] = shuffleIds(ids);
        state.quizPositions[filterKey] = 0;
        state.quizBatchOffsets[filterKey] = 0;
        if (state.activeBatch && state.activeBatch.filterKey === filterKey) state.activeBatch = null;
      }
    }

    function resetQuizRound(filterKey) {
      const list = filteredQuestions(filterKey);
      clearQuizAnswers(list);
      state.quizOrders[filterKey] = shuffleIds(list.map(question => question.id));
      state.quizPositions[filterKey] = 0;
      state.quizBatchOffsets[filterKey] = 0;
      if (state.activeBatch && state.activeBatch.filterKey === filterKey) state.activeBatch = null;
    }

    function clearQuizAnswers(list) {
      if (!state.answers || typeof state.answers !== "object") state.answers = {};
      list.forEach((question) => {
        delete state.answers[question.id];
      });
    }
    function shuffleIds(ids) {
      const shuffled = [...ids];
      for (let i = shuffled.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function activeQuizIndex() {
      const list = activeQuizQuestions();
      return clampNumber(state.quizPositions[state.activeFilterKey] || 0, 0, Math.max(0, list.length - 1));
    }

    function quizBatchOffset(filterKey, total = filteredQuestions(filterKey).length) {
      if (!state.quizBatchOffsets || typeof state.quizBatchOffsets !== "object") state.quizBatchOffsets = {};
      return clampNumber(state.quizBatchOffsets[filterKey] || 0, 0, Math.max(0, total));
    }

    function clampQuizBatchOffset(filterKey) {
      const total = filteredQuestions(filterKey).length;
      state.quizBatchOffsets[filterKey] = quizBatchOffset(filterKey, total);
    }

    function quizRemaining(filterKey, total = filteredQuestions(filterKey).length) {
      return Math.max(0, total - quizBatchOffset(filterKey, total));
    }

    function normalizeActiveBatch(batch) {
      if (!batch || typeof batch !== "object") return null;
      if (typeof batch.filterKey !== "string" || !findFilter(batch.filterKey)) return null;
      if (!Array.isArray(batch.ids)) return null;
      const ids = mergeQuestionIdLists(batch.ids);
      if (!ids.length) return null;
      return {
        filterKey: batch.filterKey,
        ids,
        start: clampNumber(batch.start || 0, 0, questions.length),
        end: clampNumber(batch.end || ids.length, 0, questions.length),
        total: clampNumber(batch.total || 0, 0, questions.length)
      };
    }

    function clampActiveQuizPosition() {
      if (!state.activeFilterKey || !hasActiveBatch()) return;
      const list = activeQuizQuestions();
      state.quizPositions[state.activeFilterKey] = activeQuizIndex();
      if (!list.length) state.quizPositions[state.activeFilterKey] = 0;
    }

    function filteredQuestions(filterKey) {
      const filter = findFilter(filterKey);
      if (!filter) return questions;
      return questions.filter((question) => question[filter.kind] === filter.value);
    }

    function findFilter(filterKey) {
      return ALL_FILTERS.find((filter) => filter.key === filterKey);
    }

    function favoriteQuestions() {
      return state.favorites
        .map(id => questions.find(question => question.id === id))
        .filter(Boolean);
    }

    function mistakeQuestions() {
      const mistakeIds = Object.keys(state.mistakes || {});
      return mistakeIds
        .map(id => questions.find(question => question.id === id))
        .filter(Boolean);
    }

    function answerRecord(questionId, mode = currentView) {
      const store = mode === "mistakes"
        ? state.mistakeAnswers
        : mode === "favorite"
          ? state.favoriteAnswers
          : state.answers;
      if (!store[questionId]) {
        store[questionId] = { selected: [], revealed: false };
      }
      if (!Array.isArray(store[questionId].selected)) {
        store[questionId].selected = [];
      }
      return store[questionId];
    }


    function normalizeMistakes(value) {
      const normalized = {};
      if (Array.isArray(value)) {
        value.forEach((id) => {
          if (questions.some(question => question.id === id)) normalized[id] = { correctCount: 0 };
        });
        return normalized;
      }
      if (!value || typeof value !== "object") return normalized;
      Object.entries(value).forEach(([id, item]) => {
        if (!questions.some(question => question.id === id)) return;
        const correctCount = item && typeof item === "object" ? clampNumber(item.correctCount || 0, 0, 2) : 0;
        normalized[id] = { correctCount };
      });
      return normalized;
    }

    function updateMistakeBook(question, record) {
      if (!question || question.type === "other") return;
      if (!state.mistakes || typeof state.mistakes !== "object") state.mistakes = {};
      const correct = isAnswerCorrect(question, record.selected);
      const existing = state.mistakes[question.id];

      if (!correct) {
        state.mistakes[question.id] = existing || { correctCount: 0 };
        if (currentView === "mistakes") showToast("仍保留在错题本");
        else showToast("已加入错题本");
        return;
      }

      if (currentView !== "mistakes" || !existing) return;
      const correctCount = clampNumber((existing.correctCount || 0) + 1, 0, 2);
      if (correctCount >= 2) {
        delete state.mistakes[question.id];
        resetMistakeAnswer(question.id);
        const listLength = mistakeQuestions().length;
        state.mistakeIndex = clampNumber(state.mistakeIndex, 0, Math.max(0, listLength - 1));
        showToast("已答对 2 次，自动移出错题本");
      } else {
        state.mistakes[question.id] = { correctCount };
        showToast(`答对 ${correctCount} / 2 次`);
      }
    }

    function isAnswerCorrect(question, selected) {
      const selectedKey = [...selected].sort().join("");
      const answerKey = [...question.answer].sort().join("");
      return selectedKey === answerKey;
    }

    function resetMistakeAnswer(questionId) {
      if (state.mistakeAnswers && state.mistakeAnswers[questionId]) {
        delete state.mistakeAnswers[questionId];
      }
    }

    function resetFavoriteAnswer(questionId) {
      if (state.favoriteAnswers && state.favoriteAnswers[questionId]) {
        delete state.favoriteAnswers[questionId];
      }
    }

    function loadSyncUser() {
      try {
        return (localStorage.getItem(SYNC_USER_KEY) || "").trim();
      } catch {
        return "";
      }
    }

    function initializeSync() {
      if (syncUserInput) syncUserInput.value = syncUser;
      updateSyncStatus();
      if (syncUser) pullCloudState(false, true);
    }

    function bindSync() {
      if (!syncUserInput) return;
      const value = syncUserInput.value.trim();
      if (!isValidSyncUser(value)) {
        showToast("同步码需为3-40位字母数字");
        return;
      }
      syncUser = value;
      localStorage.setItem(SYNC_USER_KEY, syncUser);
      updateSyncStatus("正在合并云端记录...");
      pullCloudState(true, true);
    }

    function clearSync() {
      syncUser = "";
      localStorage.removeItem(SYNC_USER_KEY);
      if (syncUserInput) syncUserInput.value = "";
      updateSyncStatus("已取消云同步，本机记录仍保留");
      showToast("已取消同步");
    }

    function isValidSyncUser(value) {
      return /^[A-Za-z0-9_-]{3,40}$/.test(value || "");
    }

    function updateSyncStatus(message) {
      if (!syncStatus) return;
      syncStatus.textContent = message || (syncUser ? `已启用同步码：${syncUser}` : "未启用云同步");
    }

    async function pullCloudState(manual = false, uploadAfter = false) {
      if (!syncUser) {
        if (manual) showToast("请先输入同步码");
        return;
      }
      try {
        updateSyncStatus("正在拉取云端记录...");
        const response = await fetch(`/api/state?user=${encodeURIComponent(syncUser)}`, { cache: "no-store" });
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload.error || "pull_failed");
        if (payload.state) {
          applyingRemoteState = true;
          state = mergeStates(state, payload.state);
          saveState();
          applyingRemoteState = false;
          renderAll();
        }
        updateSyncStatus(payload.updatedAt ? `已同步云端：${formatTime(payload.updatedAt)}` : "云端暂无记录，将保存本机记录");
        if (uploadAfter) await saveCloudState(false);
        if (manual) showToast("已拉取并合并");
      } catch {
        applyingRemoteState = false;
        updateSyncStatus("云同步连接失败，本机记录仍可使用");
        if (manual) showToast("云同步失败");
      }
    }

    async function saveCloudState(manual = false) {
      if (!syncUser) {
        if (manual) showToast("请先输入同步码");
        return;
      }
      try {
        updateSyncStatus("正在保存到云端...");
        const response = await fetch("/api/state", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user: syncUser, state: normalizeSavedState(state) })
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload.error || "save_failed");
        updateSyncStatus(`已保存云端：${formatTime(payload.updatedAt)}`);
        if (manual) showToast("已保存到云端");
      } catch {
        updateSyncStatus("云端保存失败，稍后会继续尝试");
        if (manual) showToast("保存云端失败");
      }
    }

    function scheduleCloudSave() {
      if (!syncUser) return;
      clearTimeout(cloudSaveTimer);
      cloudSaveTimer = setTimeout(() => saveCloudState(false), 900);
    }

    function formatTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "刚刚";
      return date.toLocaleString("zh-CN", { hour12: false });
    }
    function exportData() {
      if (!backupText) return;
      const payload = {
        app: "exam-practice",
        version: 1,
        storeKey: STORE_KEY,
        exportedAt: new Date().toISOString(),
        state: normalizeSavedState(state)
      };
      backupText.value = encodeBackupPayload(payload);
      backupText.focus();
      backupText.select();
      showToast("已生成备份码");
    }

    function copyBackup() {
      if (!backupText || !backupText.value.trim()) {
        showToast("请先导出备份码");
        return;
      }
      const value = backupText.value.trim();
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(value).then(() => showToast("已复制备份码")).catch(copyBackupFallback);
      } else {
        copyBackupFallback();
      }
    }

    function copyBackupFallback() {
      if (!backupText) return;
      backupText.focus();
      backupText.select();
      try {
        document.execCommand("copy");
        showToast("已复制备份码");
      } catch {
        showToast("请手动复制备份码");
      }
    }

    function importData() {
      if (!backupText) return;
      const raw = backupText.value.trim();
      if (!raw) {
        showToast("请先粘贴备份码");
        return;
      }
      try {
        const payload = decodeBackupPayload(raw);
        const imported = normalizeSavedState(payload.state || payload);
        state = mergeStates(state, imported);
        saveState();
        renderAll();
        showToast("已导入并合并");
        showView("home");
      } catch {
        showToast("备份码无法识别");
      }
    }

    function mergeStates(current, imported) {
      const base = normalizeSavedState(current);
      const incoming = normalizeSavedState(imported);
      return {
        activeFilterKey: incoming.activeFilterKey || base.activeFilterKey,
        activeBatch: incoming.activeBatch || base.activeBatch,
        quizPositions: { ...base.quizPositions, ...incoming.quizPositions },
        quizOrders: { ...base.quizOrders, ...incoming.quizOrders },
        quizBatchOffsets: { ...base.quizBatchOffsets, ...incoming.quizBatchOffsets },
        favoriteIndex: incoming.favoriteIndex || base.favoriteIndex,
        mistakeIndex: incoming.mistakeIndex || base.mistakeIndex,
        favorites: mergeQuestionIdLists(incoming.favorites, base.favorites),
        mistakes: mergeMistakeMaps(base.mistakes, incoming.mistakes),
        answers: { ...base.answers, ...incoming.answers },
        favoriteAnswers: { ...base.favoriteAnswers, ...incoming.favoriteAnswers },
        mistakeAnswers: { ...base.mistakeAnswers, ...incoming.mistakeAnswers }
      };
    }

    function mergeQuestionIdLists(...lists) {
      const ids = new Set(questions.map(question => question.id));
      const merged = [];
      lists.flat().forEach((id) => {
        if (ids.has(id) && !merged.includes(id)) merged.push(id);
      });
      return merged;
    }

    function mergeMistakeMaps(base, incoming) {
      const merged = { ...normalizeMistakes(base) };
      Object.entries(normalizeMistakes(incoming)).forEach(([id, item]) => {
        const current = merged[id] || { correctCount: 0 };
        merged[id] = { correctCount: Math.max(current.correctCount || 0, item.correctCount || 0) };
      });
      return merged;
    }

    function encodeBackupPayload(payload) {
      const bytes = new TextEncoder().encode(JSON.stringify(payload));
      let binary = "";
      bytes.forEach(byte => binary += String.fromCharCode(byte));
      return BACKUP_PREFIX + btoa(binary);
    }

    function decodeBackupPayload(value) {
      const raw = value.startsWith(BACKUP_PREFIX) ? value.slice(BACKUP_PREFIX.length) : value;
      if (raw.trim().startsWith("{")) return JSON.parse(raw);
      const binary = atob(raw);
      const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
      return JSON.parse(new TextDecoder().decode(bytes));
    }
    function clampNumber(value, min, max) {
      const number = Number.isFinite(value) ? value : Number(value);
      if (!Number.isFinite(number)) return min;
      return Math.min(Math.max(Math.trunc(number), min), max);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1400);
    }
  </script>
</body>
